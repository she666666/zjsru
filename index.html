<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <title>智能工厂数字孪生系统 - 浙江树人学院期中作业</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Microsoft YaHei', 'Segoe UI', sans-serif;
            overflow: hidden;
            background: #0a0a0a;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        #info-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 320px;
            background: rgba(10, 10, 10, 0.92);
            border-radius: 12px;
            padding: 20px;
            color: #fff;
            display: none;
            border: 1px solid rgba(0, 200, 255, 0.3);
            box-shadow: 0 8px 32px rgba(0, 150, 255, 0.15);
            max-height: 80vh;
            overflow-y: auto;
        }
        #info-panel h2 {
            color: #00c8ff;
            margin-bottom: 15px;
            font-size: 18px;
            border-bottom: 1px solid rgba(0, 200, 255, 0.3);
            padding-bottom: 10px;
        }
        #info-panel .info-item {
            margin: 10px 0;
            display: flex;
            gap: 10px;
        }
        #info-panel .info-label {
            color: #888;
            min-width: 80px;
        }
        #info-panel .info-value {
            color: #fff;
            flex: 1;
        }
        #close-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 60, 60, 0.8);
            border: none;
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
        }
        .control-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .control-btn {
            padding: 12px 20px;
            background: rgba(10, 10, 10, 0.92);
            border: 1px solid rgba(0, 200, 255, 0.3);
            color: #fff;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            min-width: 120px;
            text-align: center;
        }
        .control-btn:hover {
            background: rgba(0, 200, 255, 0.2);
            border-color: #00c8ff;
        }
        .control-btn.active {
            background: rgba(0, 200, 255, 0.3);
            border-color: #00c8ff;
            color: #00c8ff;
        }
        .layer-panel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(10, 10, 10, 0.92);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid rgba(0, 200, 255, 0.3);
        }
        .layer-panel h3 {
            color: #00c8ff;
            margin-bottom: 12px;
            font-size: 14px;
        }
        .layer-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 8px 0;
            color: #ccc;
            font-size: 13px;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 6px;
            transition: background 0.3s;
        }
        .layer-item:hover {
            background: rgba(0, 200, 255, 0.1);
        }
        .layer-item input {
            accent-color: #00c8ff;
        }
        .title-bar {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: #fff;
            z-index: 100;
        }
        .title-bar h1 {
            font-size: 24px;
            color: #00c8ff;
            text-shadow: 0 0 20px rgba(0, 200, 255, 0.5);
        }
        .title-bar p {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #00c8ff;
            font-size: 18px;
            text-align: center;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(0, 200, 255, 0.3);
            border-top-color: #00c8ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        #stats {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(10, 10, 10, 0.85);
            padding: 12px 16px;
            border-radius: 8px;
            color: #888;
            font-size: 12px;
            border: 1px solid rgba(0, 200, 255, 0.2);
        }
    </style>
</head>
<body>
    <div id="canvas-container">
        <div id="loading">
            <div class="spinner"></div>
            <p>正在加载工厂场景...</p>
        </div>
    </div>

    <div class="title-bar">
        <h1>🏭 智能工厂数字孪生系统</h1>
        <p>Digital Twin Factory System | 浙江树人学院期中作业</p>
    </div>

    <div id="info-panel">
        <button id="close-btn">×</button>
        <h2 id="info-title">对象信息</h2>
        <div id="info-content"></div>
    </div>

    <div class="control-panel">
        <div class="control-btn active" data-view="perspective">透视视角</div>
        <div class="control-btn" data-view="birdseye">鸟瞰视角</div>
        <div class="control-btn" data-view="front">正交视角</div>
        <div class="control-btn" id="toggle-animation">启用动画</div>
        <div class="control-btn" id="reset-view">重置视角</div>
    </div>

    <div class="layer-panel">
        <h3>📑 图层控制</h3>
        <label class="layer-item">
            <input type="checkbox" checked data-layer="buildings"> 建筑物
        </label>
        <label class="layer-item">
            <input type="checkbox" checked data-layer="roads"> 道路
        </label>
        <label class="layer-item">
            <input type="checkbox" checked data-layer="facilities"> 设施设备
        </label>
        <label class="layer-item">
            <input type="checkbox" checked data-layer="vegetation"> 绿化植被
        </label>
        <label class="layer-item">
            <input type="checkbox" checked data-layer="lights"> 灯光效果
        </label>
    </div>

    <div class="layer-panel" style="top: 500px;">
        <h3>💡 亮度调节</h3>
        <div style="padding: 10px;">
            <div style="display: flex;justify-content: space-between;margin-bottom: 8px;">
                <span style="color: #aaa;font-size: 13px;">亮度</span>
                <span id="brightness-value" style="color: #00c8ff;font-weight: bold;">100%</span>
            </div>
            <input type="range" id="brightness-slider" min="20" max="200" value="100" style="width:100%;">
        </div>
    </div>

    <div id="stats">
        <span id="fps">FPS: 60</span> |
        <span id="obj-count">对象: 0</span>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

        let scene, camera, renderer, controls;
        let animationEnabled = false;
        let animationId;
        let factoryObjects = { buildings: [], roads: [], facilities: [], vegetation: [], lights: [] };
        let currentView = 'perspective';
        const clock = new THREE.Clock();
        let animatedObjects = [];
        let lightIntensity = 1.0;
        let originalLightIntensities = [];

        const factoryData = {
            '主厂房': {
                type: 'buildings',
                desc: '工厂核心生产区域，占地面面积约2000平方米，采用钢结构框架结构。',
                stats: { area: '2000㎡', height: '15m', capacity: '500人', status: '运行中' }
            },
            '仓储中心': {
                type: 'buildings',
                desc: '智能化立体仓储系统，配备自动分拣和运输设备。',
                stats: { area: '1500㎡', height: '12m', capacity: '10000+件', status: '运行中' }
            },
            '办公研发楼': {
                type: 'buildings',
                desc: '集办公、研发、会议于一体的综合楼，绿色建筑认证。',
                stats: { area: '800㎡', height: '18m', floors: '5层', status: '运行中' }
            },
            '二号厂房': {
                type: 'buildings',
                desc: '新增生产车间，采用最新自动化设备，位于厂区东侧。',
                stats: { area: '1200㎡', height: '15m', status: '调试中' }
            },
            '生产设备A': {
                type: 'facilities',
                desc: '智能化生产线主机组，配备物联网传感器，实时监控生产状态。',
                stats: { model: 'SMART-3000', power: '150kW', output: '200件/小时' }
            },
            '储罐组': {
                type: 'facilities',
                desc: '原料储存罐区，配备液位监测和温控系统。',
                stats: { capacity: '50000L', temp: '20-25°C', level: '75%' }
            },
            '冷却塔': {
                type: 'facilities',
                desc: '工业循环水冷却系统，保障设备正常运转温度。',
                stats: { power: '75kW', flow: '500m³/h', efficiency: '92%' }
            },
            '主干道': {
                type: 'roads',
                desc: '工厂主干运输通道，连接各功能分区。',
                stats: { length: '200m', width: '8m', type: '混凝土路面' }
            },
            '厂区绿化': {
                type: 'vegetation',
                desc: '厂区环绕绿化带，种植银杏、梧桐等树种。',
                stats: { area: '3000㎡', trees: '150棵', coverage: '35%' }
            }
        };

        function init() {
            const container = document.getElementById('canvas-container');

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a1a);
            scene.fog = new THREE.Fog(0x0a0a1a, 100, 500);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(80, 60, 80);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2;
            container.appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.minDistance = 20;
            controls.maxDistance = 200;
            controls.maxPolarAngle = Math.PI / 2.1;

            setupLights();
            createGround();
            createFactory();
            createRoads();
            createVegetation();
            createFacilityAnimations();

            setupEventListeners();
            updateObjectCount();

            document.getElementById('loading').style.display = 'none';

            animate();
        }

        function setupLights() {
            const ambientLight = new THREE.AmbientLight(0x606080, 0.8);
            scene.add(ambientLight);
            factoryObjects.lights.push(ambientLight);
            originalLightIntensities.push(0.8);

            const mainLight = new THREE.DirectionalLight(0xffffff, 1.8);
            mainLight.position.set(50, 80, 50);
            mainLight.castShadow = true;
            mainLight.shadow.mapSize.width = 2048;
            mainLight.shadow.mapSize.height = 2048;
            mainLight.shadow.camera.near = 0.5;
            mainLight.shadow.camera.far = 300;
            mainLight.shadow.camera.left = -100;
            mainLight.shadow.camera.right = 100;
            mainLight.shadow.camera.top = 100;
            mainLight.shadow.camera.bottom = -100;
            scene.add(mainLight);
            factoryObjects.lights.push(mainLight);
            originalLightIntensities.push(1.8);

            const fillLight = new THREE.DirectionalLight(0x88aaff, 0.6);
            fillLight.position.set(-30, 40, -30);
            scene.add(fillLight);
            factoryObjects.lights.push(fillLight);
            originalLightIntensities.push(0.6);

            const hemiLight = new THREE.HemisphereLight(0x87ceeb, 0x3a5f0b, 0.6);
            scene.add(hemiLight);
            factoryObjects.lights.push(hemiLight);
            originalLightIntensities.push(0.6);

            const pointLight1 = new THREE.PointLight(0xff6600, 1.5, 30);
            pointLight1.position.set(0, 8, 0);
            scene.add(pointLight1);
            factoryObjects.lights.push(pointLight1);
            originalLightIntensities.push(1.5);
        }

        function createGround() {
            const groundGeo = new THREE.PlaneGeometry(300, 300);
            const groundMat = new THREE.MeshStandardMaterial({
                color: 0x1a1a2e,
                roughness: 0.9,
                metalness: 0.1
            });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = -0.1;
            ground.receiveShadow = true;
            scene.add(ground);
        }

        function createFactory() {
            createMainBuilding();
            createWarehouse();
            createOffice();
            createSecondBuilding();
        }

        function createMainBuilding() {
            const group = new THREE.Group();
            group.position.set(0, 0, 0);

            const loader = new GLTFLoader();
            const dracoLoader = new DRACOLoader();
            dracoLoader.setDecoderPath('https://unpkg.com/three@0.160.0/examples/jsm/libs/draco/');
            loader.setDRACOLoader(dracoLoader);
            
            console.log('正在加载主厂房模型: main.glb');
            
            loader.load(
                'main.glb',
                function (gltf) {
                    console.log('模型加载完成:', gltf);
                    
                    const model = gltf.scene;
                    
                    model.traverse(function (child) {
                        if (child.isMesh) {
                            child.castShadow = true;
                            child.receiveShadow = true;
                            console.log('找到网格:', child.name);
                        }
                    });
                    
                    model.scale.set(70, 70, 70);
                    model.position.y = 0;
                    model.position.x = 3;
                    model.position.z = -10;
                    group.add(model);
                    
                    updateObjectCount();
                    console.log('✅ 主厂房模型加载成功并添加到场景');
                },
                function (xhr) {
                    if (xhr.total > 0) {
                        const percent = Math.round(xhr.loaded / xhr.total * 100);
                        console.log('模型加载进度: ' + percent + '%');
                    }
                },
                function (error) {
                    console.error('❌ 模型加载失败:', error);
                    console.error('请确保: 1. main.glb 文件在同一目录 2. 使用本地服务器打开');
                }
            );

            group.userData = { name: '主厂房', isClickable: true };
            scene.add(group);
            factoryObjects.buildings.push(group);
        }

        function createWarehouse() {
            const loader = new GLTFLoader();
            const dracoLoader = new DRACOLoader();
            dracoLoader.setDecoderPath('https://unpkg.com/three@0.160.0/examples/jsm/libs/draco/');
            loader.setDRACOLoader(dracoLoader);
            
            console.log('📦 正在加载仓储中心: cangku.glb...');

            loader.load(
                'cangku.glb',
                (gltf) => {
                    const model = gltf.scene;
                    model.scale.set(40, 40, 40);
                    model.position.set(-60, 0, 5);
                    model.traverse((child) => {
                        if (child.isMesh) {
                            child.castShadow = true;
                            child.receiveShadow = true;
                        }
                    });
                    model.userData = { name: '仓储中心', isClickable: true };
                    scene.add(model);
                    factoryObjects.buildings.push(model);
                    console.log('✅ 仓储中心 cangku.glb 加载成功！');
                    
                    const conveyorGroup = new THREE.Group();
                    conveyorGroup.position.set(-68, 2.5, 5);
                    scene.add(conveyorGroup);

                    const conveyorBase = new THREE.Mesh(
                        new THREE.BoxGeometry(8, 0.3, 3),
                        new THREE.MeshStandardMaterial({ color: 0x444455 })
                    );
                    conveyorGroup.add(conveyorBase);

                    const boxColors = [0xffcc66, 0x66aaff, 0x66ff88, 0xff8866];
                    for (let i = 0; i < 6; i++) {
                        const box = new THREE.Mesh(
                            new THREE.BoxGeometry(1.5, 1.5, 1.5),
                            new THREE.MeshStandardMaterial({ 
                                color: boxColors[i % 4],
                                metalness: 0.1,
                                roughness: 0.6
                            })
                        );
                        box.position.set(-4 + i * 1.6, 1, 0);
                        box.userData = { 
                            type: 'warehouse-box', 
                            startX: -4, 
                            endX: 4, 
                            speed: 0.08, 
                            offset: i * 1.6 
                        };
                        conveyorGroup.add(box);
                        animatedObjects.push(box);
                    }

                    const rollerMat = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.8, roughness: 0.4 });
                    for (let i = 0; i < 8; i++) {
                        const roller = new THREE.Mesh(
                            new THREE.CylinderGeometry(0.2, 0.2, 2.8, 16),
                            rollerMat
                        );
                        roller.rotation.z = Math.PI / 2;
                        roller.position.set(-3.5 + i, 0.5, 0);
                        roller.userData = { type: 'roller', speed: 0.1 };
                        conveyorGroup.add(roller);
                        animatedObjects.push(roller);
                    }
                },
                (progress) => {
                    const percent = (progress.loaded / progress.total * 100).toFixed(0);
                    console.log(`📦 仓储中心加载中: ${percent}%`);
                },
                (error) => {
                    console.error('❌ cangku.glb 加载失败:', error);
                    console.log('🎨 创建备用仓储中心...');
                    createFallbackWarehouse();
                }
            );
        }

        function createFallbackWarehouse() {
            const group = new THREE.Group();
            group.position.set(-50, 0, 20);

            const bodyGeo = new THREE.BoxGeometry(35, 10, 20);
            const bodyMat = new THREE.MeshStandardMaterial({
                color: 0x556677,
                roughness: 0.8,
                metalness: 0.2
            });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = 5;
            body.castShadow = true;
            body.receiveShadow = true;
            group.add(body);

            const roofGeo = new THREE.BoxGeometry(37, 1.5, 22);
            const roofMat = new THREE.MeshStandardMaterial({ 
                color: 0x3a4a5a, 
                emissive: 0x00ff88,
                emissiveIntensity: 0.3
            });
            const roof = new THREE.Mesh(roofGeo, roofMat);
            roof.position.y = 10.75;
            roof.castShadow = true;
            group.add(roof);
            roof.userData = { type: 'pulse', originalIntensity: 0.3 };
            animatedObjects.push(roof);

            const dockGeo = new THREE.BoxGeometry(10, 8, 3);
            const dockMat = new THREE.MeshStandardMaterial({ color: 0x667788 });
            const dock = new THREE.Mesh(dockGeo, dockMat);
            dock.position.set(-8, 4, 10);
            dock.castShadow = true;
            group.add(dock);

            const conveyorGroup = new THREE.Group();
            conveyorGroup.position.set(-8, 2.5, 10);
            group.add(conveyorGroup);

            const conveyorBase = new THREE.Mesh(
                new THREE.BoxGeometry(8, 0.3, 3),
                new THREE.MeshStandardMaterial({ color: 0x444455 })
            );
            conveyorGroup.add(conveyorBase);

            const boxColors = [0xffcc66, 0x66aaff, 0x66ff88, 0xff8866];
            const movingBoxes = [];
            for (let i = 0; i < 6; i++) {
                const box = new THREE.Mesh(
                    new THREE.BoxGeometry(1.5, 1.5, 1.5),
                    new THREE.MeshStandardMaterial({ 
                        color: boxColors[i % 4],
                        metalness: 0.1,
                        roughness: 0.6
                    })
                );
                box.position.set(-4 + i * 1.6, 1, 0);
                box.userData = { 
                    type: 'warehouse-box', 
                    startX: -4, 
                    endX: 4, 
                    speed: 0.08, 
                    offset: i * 1.6 
                };
                conveyorGroup.add(box);
                animatedObjects.push(box);
            }

            const rollerMat = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.8, roughness: 0.4 });
            for (let i = 0; i < 8; i++) {
                const roller = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.2, 0.2, 2.8, 16),
                    rollerMat
                );
                roller.rotation.z = Math.PI / 2;
                roller.position.set(-3.5 + i, 0.5, 0);
                roller.userData = { type: 'roller', speed: 0.1 };
                conveyorGroup.add(roller);
                animatedObjects.push(roller);
            }

            group.userData = { name: '仓储中心', isClickable: true };
            scene.add(group);
            factoryObjects.buildings.push(group);
        }

        function createOffice() {
            const group = new THREE.Group();
            group.position.set(50, 0, -30);

            for (let i = 0; i < 4; i++) {
                const floorGeo = new THREE.BoxGeometry(20, 4, 12);
                const floorMat = new THREE.MeshStandardMaterial({
                    color: new THREE.Color().setHSL(0.58, 0.3, 0.25 + i * 0.02),
                    roughness: 0.6,
                    metalness: 0.3
                });
                const floor = new THREE.Mesh(floorGeo, floorMat);
                floor.position.y = 2 + i * 4.5;
                floor.castShadow = true;
                floor.receiveShadow = true;
                group.add(floor);
            }

            const glassGeo = new THREE.BoxGeometry(18, 3, 0.3);
            const glassMat = new THREE.MeshStandardMaterial({
                color: 0xaaddff,
                transparent: true,
                opacity: 0.6,
                roughness: 0.1,
                metalness: 0.9
            });
            for (let i = 0; i < 4; i++) {
                const glass = new THREE.Mesh(glassGeo, glassMat);
                glass.position.set(0, 3.5 + i * 4.5, 6.2);
                group.add(glass);
            }

            group.userData = { name: '办公研发楼', isClickable: true };
            scene.add(group);
            factoryObjects.buildings.push(group);
        }

        function createSecondBuilding() {
            const loader = new GLTFLoader();
            const dracoLoader = new DRACOLoader();
            dracoLoader.setDecoderPath('https://unpkg.com/three@0.160.0/examples/jsm/libs/draco/');
            loader.setDRACOLoader(dracoLoader);
            
            console.log('🚀 正在加载 main2.glb...');

            loader.load(
                'main2.glb',
                (gltf) => {
                    const model = gltf.scene;
                    model.scale.set(70, 70, 70);
                    model.position.set(82, 0, 30);
                    model.rotation.y = Math.PI / -2;
                    model.traverse((child) => {
                        if (child.isMesh) {
                            child.castShadow = true;
                            child.receiveShadow = true;
                        }
                    });
                    model.userData = { name: '二号厂房', isClickable: true };
                    scene.add(model);
                    factoryObjects.buildings.push(model);
                    console.log('✅ main2.glb 加载成功！');
                },
                (progress) => {
                    const percent = (progress.loaded / progress.total * 100).toFixed(0);
                    console.log(`📦 二号厂房加载中: ${percent}%`);
                },
                (error) => {
                    console.error('❌ main2.glb 加载失败:', error);
                    console.log('🎨 创建备用二号厂房...');
                    createFallbackSecondBuilding();
                }
            );
        }

        function createVegetation() {
            const trunkMat = new THREE.MeshStandardMaterial({ color: 0x4a3728 });
            const leafMat = new THREE.MeshStandardMaterial({ color: 0x2d5a27 });

            for (let i = 0; i < 20; i++) {
                const tree = new THREE.Group();
                const x = (Math.random() - 0.5) * 200;
                const z = (Math.random() - 0.5) * 200;

                if (Math.abs(x) < 25 && Math.abs(z - 30) < 15) continue;
                if (Math.abs(x) < 20 && Math.abs(z + 30) < 80) continue;

                const trunkGeo = new THREE.CylinderGeometry(0.3, 0.5, 4, 8);
                const trunk = new THREE.Mesh(trunkGeo, trunkMat);
                trunk.position.y = 2;
                trunk.castShadow = true;
                tree.add(trunk);

                const leafGeo = new THREE.SphereGeometry(2.5, 8, 6);
                const leaf = new THREE.Mesh(leafGeo, leafMat);
                leaf.position.y = 5;
                leaf.castShadow = true;
                tree.add(leaf);

                tree.position.set(x, 0, z);
                tree.userData = { name: '厂区绿化', isClickable: true };
                scene.add(tree);
                factoryObjects.vegetation.push(tree);
            }

            for (let i = 0; i < 30; i++) {
                const bush = new THREE.Group();
                const x = (Math.random() - 0.5) * 180;
                const z = (Math.random() - 0.5) * 180;

                if (Math.abs(x) < 30 && Math.abs(z) < 50) continue;

                const bushGeo = new THREE.SphereGeometry(1.2, 6, 4);
                const bushMesh = new THREE.Mesh(bushGeo, leafMat);
                bushMesh.position.y = 0.8;
                bushMesh.castShadow = true;
                bush.add(bushMesh);

                bush.position.set(x, 0, z);
                scene.add(bush);
                factoryObjects.vegetation.push(bush);
            }
        }

        function setupEventListeners() {
            window.addEventListener('resize', onWindowResize);

            const raycaster = new THREE.Raycaster();
            const mouse = new THREE.Vector2();

            renderer.domElement.addEventListener('click', (event) => {
                mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(scene.children, true);

                for (const intersect of intersects) {
                    let obj = intersect.object;
                    while (obj.parent && !obj.userData.name) {
                        obj = obj.parent;
                    }
                    if (obj.userData.name && obj.userData.isClickable) {
                        showInfo(obj.userData.name);
                        highlightObject(obj);
                        break;
                    }
                }
            });

            document.querySelectorAll('.control-btn[data-view]').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.control-btn[data-view]').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    switchView(btn.dataset.view);
                });
            });

            document.getElementById('toggle-animation').addEventListener('click', function() {
                animationEnabled = !animationEnabled;
                this.textContent = animationEnabled ? '暂停动画' : '启用动画';
                this.classList.toggle('active', animationEnabled);
            });

            document.getElementById('reset-view').addEventListener('click', () => {
                switchView('perspective');
                document.querySelectorAll('.control-btn[data-view]').forEach(b => {
                    b.classList.toggle('active', b.dataset.view === 'perspective');
                });
            });

            document.getElementById('close-btn').addEventListener('click', () => {
                document.getElementById('info-panel').style.display = 'none';
            });

            document.querySelectorAll('.layer-item input').forEach(checkbox => {
                checkbox.addEventListener('change', (e) => {
                    toggleLayer(e.target.dataset.layer, e.target.checked);
                });
            });

            const brightnessSlider = document.getElementById('brightness-slider');
            const brightnessValue = document.getElementById('brightness-value');
            brightnessSlider.addEventListener('input', (e) => {
                const value = e.target.value;
                brightnessValue.textContent = value + '%';
                lightIntensity = value / 100;
                updateBrightness();
            });
        }

        function updateBrightness() {
            renderer.toneMappingExposure = lightIntensity;
            factoryObjects.lights.forEach((light, index) => {
                if (originalLightIntensities[index] !== undefined) {
                    light.intensity = originalLightIntensities[index] * lightIntensity;
                }
            });
        }

        function switchView(view) {
            currentView = view;
            let targetPos, targetLook;

            switch (view) {
                case 'perspective':
                    targetPos = new THREE.Vector3(80, 60, 80);
                    targetLook = new THREE.Vector3(0, 0, 0);
                    break;
                case 'birdseye':
                    targetPos = new THREE.Vector3(0, 150, 0.1);
                    targetLook = new THREE.Vector3(0, 0, 0);
                    break;
                case 'front':
                    targetPos = new THREE.Vector3(0, 30, 200);
                    targetLook = new THREE.Vector3(0, 10, 0);
                    break;
            }

            animateCamera(targetPos, targetLook);
        }

        function animateCamera(targetPos, targetLook) {
            const startPos = camera.position.clone();
            const startTarget = controls.target.clone();
            const duration = 1000;
            const startTime = Date.now();

            function update() {
                const elapsed = Date.now() - startTime;
                const t = Math.min(elapsed / duration, 1);
                const eased = 1 - Math.pow(1 - t, 3);

                camera.position.lerpVectors(startPos, targetPos, eased);
                controls.target.lerpVectors(startTarget, targetLook, eased);
                controls.update();

                if (t < 1) requestAnimationFrame(update);
            }
            update();
        }

        function showInfo(name) {
            const data = factoryData[name];
            if (!data) return;

            const panel = document.getElementById('info-panel');
            const title = document.getElementById('info-title');
            const content = document.getElementById('info-content');

            title.textContent = `📋 ${name}`;
            content.innerHTML = `
                <p style="color:#ccc;margin-bottom:15px;">${data.desc}</p>
                <div style="border-top:1px solid rgba(0,200,255,0.2);padding-top:10px;">
                    ${Object.entries(data.stats).map(([k, v]) => `
                        <div class="info-item">
                            <span class="info-label">${k}:</span>
                            <span class="info-value">${v}</span>
                        </div>
                    `).join('')}
                </div>
            `;
            panel.style.display = 'block';
        }

        let highlightedObject = null;
        function highlightObject(obj) {
            if (highlightedObject) {
                resetObjectColor(highlightedObject);
            }
            highlightedObject = obj;

            obj.traverse((child) => {
                if (child.isMesh && child.material) {
                    child.userData.originalEmissive = child.material.emissive ? child.material.emissive.clone() : new THREE.Color(0x000000);
                    child.material.emissive = new THREE.Color(0x00c8ff);
                    child.material.emissiveIntensity = 0.3;
                }
            });
        }

        function resetObjectColor(obj) {
            obj.traverse((child) => {
                if (child.isMesh && child.material && child.userData.originalEmissive) {
                    child.material.emissive = child.userData.originalEmissive;
                    child.material.emissiveIntensity = child.userData.originalEmissiveIntensity || 0;
                }
            });
        }

        function toggleLayer(layerName, visible) {
            const objects = factoryObjects[layerName];
            if (!objects) return;

            objects.forEach(obj => {
                obj.visible = visible;
            });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function updateObjectCount() {
            let count = 0;
            Object.values(factoryObjects).forEach(arr => count += arr.length);
            document.getElementById('obj-count').textContent = `对象: ${count}`;
        }

        function animate() {
            animationId = requestAnimationFrame(animate);

            const delta = clock.getDelta();
            const time = clock.getElapsedTime();

            if (animationEnabled) {
                animatedObjects.forEach((obj) => {
                    if (obj.userData.type === 'crane') {
                        obj.position.x = obj.userData.originalX + Math.sin(time + obj.userData.phase) * 15;
                        obj.position.y = obj.userData.originalY + Math.sin(time * 2 + obj.userData.phase) * 0.5;
                    } else if (obj.userData.type === 'pulse') {
                        const intensity = obj.userData.originalIntensity + Math.sin(time * 3) * 0.2;
                        obj.material.emissiveIntensity = Math.max(0, intensity);
                    } else if (obj.userData.type === 'cooling-fan') {
                        obj.rotation.y += obj.userData.speed;
                    } else if (obj.userData.type === 'steam') {
                        obj.position.y += obj.userData.speed;
                        obj.material.opacity = 0.3 + Math.sin(time + obj.userData.offset) * 0.3;
                        if (obj.position.y > obj.userData.originalY + 8) {
                            obj.position.y = obj.userData.originalY;
                        }
                    } else if (obj.userData.type === 'warehouse-box') {
                        obj.position.x += obj.userData.speed;
                        obj.rotation.y += 0.01;
                        if (obj.position.x > obj.userData.endX + 2) {
                            obj.position.x = obj.userData.startX - 2;
                        }
                    } else if (obj.userData.type === 'roller') {
                        obj.rotation.x += obj.userData.speed;
                    }
                });
            }

            controls.update();
            renderer.render(scene, camera);
            const fps = Math.round(1 / Math.max(delta, 0.016));
            document.getElementById('fps').textContent = `FPS: ${fps}`;
        }

        init();
    </script>
