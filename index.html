<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能工厂数字孪生系统 - 浙江树人学院期中作业</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Microsoft YaHei', 'Segoe UI', sans-serif;
            overflow: hidden;
            background: #0a0a0a;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        #info-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 320px;
            background: rgba(10, 10, 10, 0.92);
            border-radius: 12px;
            padding: 20px;
            color: #fff;
            display: none;
            border: 1px solid rgba(0, 200, 255, 0.3);
            box-shadow: 0 8px 32px rgba(0, 150, 255, 0.15);
            max-height: 80vh;
            overflow-y: auto;
        }
        #info-panel h2 {
            color: #00c8ff;
            margin-bottom: 15px;
            font-size: 18px;
            border-bottom: 1px solid rgba(0, 200, 255, 0.3);
            padding-bottom: 10px;
        }
        #info-panel .info-item {
            margin: 10px 0;
            display: flex;
            gap: 10px;
        }
        #info-panel .info-label {
            color: #888;
            min-width: 80px;
        }
        #info-panel .info-value {
            color: #fff;
            flex: 1;
        }
        #close-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 60, 60, 0.8);
            border: none;
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
        }
        .control-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .control-btn {
            padding: 12px 20px;
            background: rgba(10, 10, 10, 0.92);
            border: 1px solid rgba(0, 200, 255, 0.3);
            color: #fff;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            min-width: 120px;
            text-align: center;
        }
        .control-btn:hover {
            background: rgba(0, 200, 255, 0.2);
            border-color: #00c8ff;
        }
        .control-btn.active {
            background: rgba(0, 200, 255, 0.3);
            border-color: #00c8ff;
            color: #00c8ff;
        }
        .layer-panel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(10, 10, 10, 0.92);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid rgba(0, 200, 255, 0.3);
        }
        .layer-panel h3 {
            color: #00c8ff;
            margin-bottom: 12px;
            font-size: 14px;
        }
        .layer-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 8px 0;
            color: #ccc;
            font-size: 13px;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 6px;
            transition: background 0.3s;
        }
        .layer-item:hover {
            background: rgba(0, 200, 255, 0.1);
        }
        .layer-item input {
            accent-color: #00c8ff;
        }
        .title-bar {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: #fff;
            z-index: 100;
        }
        .title-bar h1 {
            font-size: 24px;
            color: #00c8ff;
            text-shadow: 0 0 20px rgba(0, 200, 255, 0.5);
        }
        .title-bar p {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #00c8ff;
            font-size: 18px;
            text-align: center;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(0, 200, 255, 0.3);
            border-top-color: #00c8ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        #stats {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(10, 10, 10, 0.85);
            padding: 12px 16px;
            border-radius: 8px;
            color: #888;
            font-size: 12px;
            border: 1px solid rgba(0, 200, 255, 0.2);
        }
    </style>
</head>
<body>
    <div id="canvas-container">
        <div id="loading">
            <div class="spinner"></div>
            <p>正在加载工厂场景...</p>
        </div>
    </div>

    <div class="title-bar">
        <h1>🏭 智能工厂数字孪生系统</h1>
        <p>Digital Twin Factory System | 浙江树人学院期中作业</p>
    </div>

    <div id="info-panel">
        <button id="close-btn">×</button>
        <h2 id="info-title">对象信息</h2>
        <div id="info-content"></div>
    </div>

    <div class="control-panel">
        <div class="control-btn active" data-view="perspective">透视视角</div>
        <div class="control-btn" data-view="birdseye">鸟瞰视角</div>
        <div class="control-btn" data-view="front">正交视角</div>
        <div class="control-btn" id="toggle-animation">启用动画</div>
        <div class="control-btn" id="reset-view">重置视角</div>
    </div>

    <div class="layer-panel">
        <h3>📑 图层控制</h3>
        <label class="layer-item">
            <input type="checkbox" checked data-layer="buildings"> 建筑物
        </label>
        <label class="layer-item">
            <input type="checkbox" checked data-layer="roads"> 道路
        </label>
        <label class="layer-item">
            <input type="checkbox" checked data-layer="facilities"> 设施设备
        </label>
        <label class="layer-item">
            <input type="checkbox" checked data-layer="vegetation"> 绿化植被
        </label>
        <label class="layer-item">
            <input type="checkbox" checked data-layer="lights"> 灯光效果
        </label>
    </div>

    <div id="stats">
        <span id="fps">FPS: 60</span> |
        <span id="obj-count">对象: 0</span>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        let scene, camera, renderer, controls;
        let animationEnabled = false;
        let animationId;
        let factoryObjects = { buildings: [], roads: [], facilities: [], vegetation: [], lights: [] };
        let currentView = 'perspective';
        const clock = new THREE.Clock();

        const factoryData = {
            '主厂房': {
                type: 'buildings',
                desc: '工厂核心生产区域，占地面面积约2000平方米，采用钢结构框架结构。',
                stats: { area: '2000㎡', height: '15m', capacity: '500人', status: '运行中' }
            },
            '仓储中心': {
                type: 'buildings',
                desc: '智能化立体仓储系统，配备自动分拣和运输设备。',
                stats: { area: '1500㎡', height: '12m', capacity: '10000+件', status: '运行中' }
            },
            '办公研发楼': {
                type: 'buildings',
                desc: '集办公、研发、会议于一体的综合楼，绿色建筑认证。',
                stats: { area: '800㎡', height: '18m', floors: '5层', status: '运行中' }
            },
            '生产设备A': {
                type: 'facilities',
                desc: '智能化生产线主机组，配备物联网传感器，实时监控生产状态。',
                stats: { model: 'SMART-3000', power: '150kW', output: '200件/小时' }
            },
            '储罐组': {
                type: 'facilities',
                desc: '原料储存罐区，配备液位监测和温控系统。',
                stats: { capacity: '50000L', temp: '20-25°C', level: '75%' }
            },
            '冷却塔': {
                type: 'facilities',
                desc: '工业循环水冷却系统，保障设备正常运转温度。',
                stats: { power: '75kW', flow: '500m³/h', efficiency: '92%' }
            },
            '主干道': {
                type: 'roads',
                desc: '工厂主干运输通道，连接各功能分区。',
                stats: { length: '200m', width: '8m', type: '混凝土路面' }
            },
            '厂区绿化': {
                type: 'vegetation',
                desc: '厂区环绕绿化带，种植银杏、梧桐等树种。',
                stats: { area: '3000㎡', trees: '150棵', coverage: '35%' }
            }
        };

        function init() {
            const container = document.getElementById('canvas-container');

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a1a);
            scene.fog = new THREE.Fog(0x0a0a1a, 100, 500);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(80, 60, 80);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2;
            container.appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.minDistance = 20;
            controls.maxDistance = 200;
            controls.maxPolarAngle = Math.PI / 2.1;

            setupLights();
            createGround();
            createFactory();
            createRoads();
            createVegetation();
            createFacilityAnimations();

            setupEventListeners();
            updateObjectCount();

            document.getElementById('loading').style.display = 'none';

            animate();
        }

        function setupLights() {
            const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
            scene.add(ambientLight);
            factoryObjects.lights.push(ambientLight);

            const mainLight = new THREE.DirectionalLight(0xffffff, 1.2);
            mainLight.position.set(50, 80, 50);
            mainLight.castShadow = true;
            mainLight.shadow.mapSize.width = 2048;
            mainLight.shadow.mapSize.height = 2048;
            mainLight.shadow.camera.near = 0.5;
            mainLight.shadow.camera.far = 300;
            mainLight.shadow.camera.left = -100;
            mainLight.shadow.camera.right = 100;
            mainLight.shadow.camera.top = 100;
            mainLight.shadow.camera.bottom = -100;
            scene.add(mainLight);
            factoryObjects.lights.push(mainLight);

            const fillLight = new THREE.DirectionalLight(0x88aaff, 0.3);
            fillLight.position.set(-30, 40, -30);
            scene.add(fillLight);

            const hemiLight = new THREE.HemisphereLight(0x87ceeb, 0x3a5f0b, 0.4);
            scene.add(hemiLight);

            const pointLight1 = new THREE.PointLight(0xff6600, 1, 30);
            pointLight1.position.set(0, 8, 0);
            scene.add(pointLight1);
            factoryObjects.lights.push(pointLight1);
        }

        function createGround() {
            const groundGeo = new THREE.PlaneGeometry(300, 300);
            const groundMat = new THREE.MeshStandardMaterial({
                color: 0x1a1a2e,
                roughness: 0.9,
                metalness: 0.1
            });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = -0.1;
            ground.receiveShadow = true;
            scene.add(ground);
        }

        function createFactory() {
            createMainBuilding();
            createWarehouse();
            createOffice();
        }

        function createMainBuilding() {
            const group = new THREE.Group();
            group.position.set(0, 0, 0);

            const baseGeo = new THREE.BoxGeometry(40, 12, 25);
            const baseMat = new THREE.MeshStandardMaterial({
                color: 0x445566,
                roughness: 0.7,
                metalness: 0.3
            });
            const base = new THREE.Mesh(baseGeo, baseMat);
            base.position.y = 6;
            base.castShadow = true;
            base.receiveShadow = true;
            group.add(base);

            const roofGeo = new THREE.BoxGeometry(42, 2, 27);
            const roofMat = new THREE.MeshStandardMaterial({
                color: 0x2a3a4a,
                roughness: 0.6,
                metalness: 0.4
            });
            const roof = new THREE.Mesh(roofGeo, roofMat);
            roof.position.y = 13;
            roof.castShadow = true;
            group.add(roof);

            for (let i = 0; i < 4; i++) {
                const windowGeo = new THREE.BoxGeometry(8, 4, 0.5);
                const windowMat = new THREE.MeshStandardMaterial({
                    color: 0x88ccff,
                    emissive: 0x224466,
                    emissiveIntensity: 0.3,
                    roughness: 0.2,
                    metalness: 0.8
                });
                const windowMesh = new THREE.Mesh(windowGeo, windowMat);
                windowMesh.position.set(-15 + i * 10, 6, 12.8);
                group.add(windowMesh);
            }

            const doorGeo = new THREE.BoxGeometry(6, 8, 0.5);
            const doorMat = new THREE.MeshStandardMaterial({ color: 0x553333 });
            const door = new THREE.Mesh(doorGeo, doorMat);
            door.position.set(0, 4, 12.8);
            group.add(door);

            group.userData = { name: '主厂房', isClickable: true };
            scene.add(group);
            factoryObjects.buildings.push(group);
        }

        function createWarehouse() {
            const group = new THREE.Group();
            group.position.set(-50, 0, 20);

            const bodyGeo = new THREE.BoxGeometry(35, 10, 20);
            const bodyMat = new THREE.MeshStandardMaterial({
                color: 0x556677,
                roughness: 0.8,
                metalness: 0.2
            });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = 5;
            body.castShadow = true;
            body.receiveShadow = true;
            group.add(body);

            const roofGeo = new THREE.BoxGeometry(37, 1.5, 22);
            const roofMat = new THREE.MeshStandardMaterial({ color: 0x3a4a5a });
            const roof = new THREE.Mesh(roofGeo, roofMat);
            roof.position.y = 10.75;
            roof.castShadow = true;
            group.add(roof);

            const dockGeo = new THREE.BoxGeometry(10, 8, 3);
            const dockMat = new THREE.MeshStandardMaterial({ color: 0x667788 });
            const dock = new THREE.Mesh(dockGeo, dockMat);
            dock.position.set(-8, 4, 10);
            dock.castShadow = true;
            group.add(dock);

            group.userData = { name: '仓储中心', isClickable: true };
            scene.add(group);
            factoryObjects.buildings.push(group);
        }

        function createOffice() {
            const group = new THREE.Group();
            group.position.set(50, 0, -30);

            for (let i = 0; i < 4; i++) {
                const floorGeo = new THREE.BoxGeometry(20, 4, 12);
                const floorMat = new THREE.MeshStandardMaterial({
                    color: new THREE.Color().setHSL(0.58, 0.3, 0.25 + i * 0.02),
                    roughness: 0.6,
                    metalness: 0.3
                });
                const floor = new THREE.Mesh(floorGeo, floorMat);
                floor.position.y = 2 + i * 4.5;
                floor.castShadow = true;
                floor.receiveShadow = true;
                group.add(floor);
            }

            const glassGeo = new THREE.BoxGeometry(18, 3, 0.3);
            const glassMat = new THREE.MeshStandardMaterial({
                color: 0xaaddff,
                transparent: true,
                opacity: 0.6,
                roughness: 0.1,
                metalness: 0.9
            });
            for (let i = 0; i < 4; i++) {
                const glass = new THREE.Mesh(glassGeo, glassMat);
                glass.position.set(0, 3.5 + i * 4.5, 6.2);
                group.add(glass);
            }

            group.userData = { name: '办公研发楼', isClickable: true };
            scene.add(group);
            factoryObjects.buildings.push(group);
        }

        function createRoads() {
            const roadMat = new THREE.MeshStandardMaterial({
                color: 0x333344,
                roughness: 0.95,
                metalness: 0
            });

            const mainRoad = new THREE.Mesh(
                new THREE.PlaneGeometry(200, 10),
                roadMat
            );
            mainRoad.rotation.x = -Math.PI / 2;
            mainRoad.position.set(0, 0.05, 30);
            mainRoad.receiveShadow = true;
            scene.add(mainRoad);
            factoryObjects.roads.push(mainRoad);

            const crossRoad = new THREE.Mesh(
                new THREE.PlaneGeometry(10, 150),
                roadMat
            );
            crossRoad.rotation.x = -Math.PI / 2;
            crossRoad.position.set(0, 0.05, -20);
            crossRoad.receiveShadow = true;
            scene.add(crossRoad);
            factoryObjects.roads.push(crossRoad);

            const markingMat = new THREE.MeshBasicMaterial({ color: 0xffff00 });
            for (let i = -80; i < 80; i += 10) {
                const marking = new THREE.Mesh(
                    new THREE.PlaneGeometry(4, 0.3),
                    markingMat
                );
                marking.rotation.x = -Math.PI / 2;
                marking.position.set(i, 0.1, 30);
                scene.add(marking);
                factoryObjects.roads.push(marking);
            }

            const pathMat = new THREE.MeshStandardMaterial({ color: 0x444455 });
            const pedestrianPath = new THREE.Mesh(
                new THREE.PlaneGeometry(3, 80),
                pathMat
            );
            pedestrianPath.rotation.x = -Math.PI / 2;
            pedestrianPath.position.set(25, 0.05, -10);
            pedestrianPath.receiveShadow = true;
            scene.add(pedestrianPath);
            factoryObjects.roads.push(pedestrianPath);
        }

        function createVegetation() {
            const trunkMat = new THREE.MeshStandardMaterial({ color: 0x4a3728 });
            const leafMat = new THREE.MeshStandardMaterial({ color: 0x2d5a27 });

            for (let i = 0; i < 20; i++) {
                const tree = new THREE.Group();
                const x = (Math.random() - 0.5) * 200;
                const z = (Math.random() - 0.5) * 200;

                if (Math.abs(x) < 25 && Math.abs(z - 30) < 15) continue;
                if (Math.abs(x) < 20 && Math.abs(z + 30) < 80) continue;

                const trunkGeo = new THREE.CylinderGeometry(0.3, 0.5, 4, 8);
                const trunk = new THREE.Mesh(trunkGeo, trunkMat);
                trunk.position.y = 2;
                trunk.castShadow = true;
                tree.add(trunk);

                const leafGeo = new THREE.SphereGeometry(2.5, 8, 6);
                const leaf = new THREE.Mesh(leafGeo, leafMat);
                leaf.position.y = 5;
                leaf.castShadow = true;
                tree.add(leaf);

                tree.position.set(x, 0, z);
                tree.userData = { name: '厂区绿化', isClickable: true };
                scene.add(tree);
                factoryObjects.vegetation.push(tree);
            }

            for (let i = 0; i < 30; i++) {
                const bush = new THREE.Group();
                const x = (Math.random() - 0.5) * 180;
                const z = (Math.random() - 0.5) * 180;

                if (Math.abs(x) < 30 && Math.abs(z) < 50) continue;

                const bushGeo = new THREE.SphereGeometry(1.2, 6, 4);
                const bushMesh = new THREE.Mesh(bushGeo, leafMat);
                bushMesh.position.y = 0.8;
                bushMesh.castShadow = true;
                bush.add(bushMesh);

                bush.position.set(x, 0, z);
                scene.add(bush);
                factoryObjects.vegetation.push(bush);
            }
        }

        function createFacilityAnimations() {
            createProductionEquipment();
            createStorageTanks();
            createCoolingTower();
            createCranes();
        }

        function createProductionEquipment() {
            const group = new THREE.Group();
            group.position.set(5, 0, -5);

            const baseMat = new THREE.MeshStandardMaterial({ color: 0x555566, metalness: 0.6, roughness: 0.4 });
            const base = new THREE.Mesh(new THREE.BoxGeometry(15, 3, 8), baseMat);
            base.position.y = 1.5;
            base.castShadow = true;
            group.add(base);

            for (let i = 0; i < 3; i++) {
                const machine = new THREE.Group();
                const machineBody = new THREE.Mesh(
                    new THREE.BoxGeometry(4, 5, 4),
                    new THREE.MeshStandardMaterial({ color: 0x667788, metalness: 0.7, roughness: 0.3 })
                );
                machineBody.position.y = 2.5;
                machineBody.castShadow = true;
                machine.add(machineBody);

                const screen = new THREE.Mesh(
                    new THREE.BoxGeometry(2, 1.5, 0.2),
                    new THREE.MeshStandardMaterial({
                        color: 0x00ff88,
                        emissive: 0x00aa44,
                        emissiveIntensity: 0.5
                    })
                );
                screen.position.set(0, 3.5, 2);
                machine.add(screen);

                machine.position.x = -5 + i * 5;
                group.add(machine);
            }

            group.userData = { name: '生产设备A', isClickable: true };
            scene.add(group);
            factoryObjects.facilities.push(group);
        }

        function createStorageTanks() {
            const group = new THREE.Group();
            group.position.set(-35, 0, -40);

            for (let i = 0; i < 4; i++) {
                const tank = new THREE.Group();

                const body = new THREE.Mesh(
                    new THREE.CylinderGeometry(4, 4, 10, 16),
                    new THREE.MeshStandardMaterial({ color: 0x5588aa, metalness: 0.5, roughness: 0.4 })
                );
                body.position.y = 5;
                body.castShadow = true;
                tank.add(body);

                const top = new THREE.Mesh(
                    new THREE.SphereGeometry(4, 16, 8, 0, Math.PI * 2, 0, Math.PI / 2),
                    new THREE.MeshStandardMaterial({ color: 0x5588aa, metalness: 0.5, roughness: 0.4 })
                );
                top.position.y = 10;
                tank.add(top);

                const pipe = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.3, 0.3, 3, 8),
                    new THREE.MeshStandardMaterial({ color: 0x445566 })
                );
                pipe.position.set(4.5, 8, 0);
                tank.add(pipe);

                tank.position.x = (i % 2) * 12;
                tank.position.z = Math.floor(i / 2) * 12;
                group.add(tank);
            }

            group.userData = { name: '储罐组', isClickable: true };
            scene.add(group);
            factoryObjects.facilities.push(group);
        }

        function createCoolingTower() {
            const group = new THREE.Group();
            group.position.set(40, 0, 10);

            const tower = new THREE.Mesh(
                new THREE.CylinderGeometry(3, 6, 15, 12),
                new THREE.MeshStandardMaterial({ color: 0x667788, metalness: 0.3, roughness: 0.7 })
            );
            tower.position.y = 7.5;
            tower.castShadow = true;
            group.add(tower);

            const water = new THREE.Mesh(
                new THREE.CylinderGeometry(2.5, 2.5, 1, 12),
                new THREE.MeshStandardMaterial({
                    color: 0x4488aa,
                    transparent: true,
                    opacity: 0.7,
                    metalness: 0.1,
                    roughness: 0.1
                })
            );
            water.position.y = 14;
            group.add(water);

            group.userData = { name: '冷却塔', isClickable: true };
            scene.add(group);
            factoryObjects.facilities.push(group);
        }

        function createCranes() {
            const beamMat = new THREE.MeshStandardMaterial({ color: 0xffaa00, metalness: 0.7, roughness: 0.3 });

            const beam = new THREE.Mesh(new THREE.BoxGeometry(50, 1.5, 2), beamMat);
            beam.position.set(0, 16, -10);
            beam.castShadow = true;
            scene.add(beam);
            factoryObjects.facilities.push(beam);

            for (let i = 0; i < 2; i++) {
                const crane = new THREE.Group();

                const cabin = new THREE.Mesh(
                    new THREE.BoxGeometry(2, 3, 2),
                    new THREE.MeshStandardMaterial({ color: 0xffcc00, metalness: 0.6 })
                );
                cabin.position.y = 1.5;
                crane.add(cabin);

                const hook = new THREE.Mesh(
                    new THREE.BoxGeometry(0.5, 3, 0.5),
                    new THREE.MeshStandardMaterial({ color: 0x888888 })
                );
                hook.position.y = -1.5;
                crane.add(hook);

                crane.position.set(-20 + i * 40, 14.25, -10);
                crane.userData = { originalY: 14.25, phase: i * Math.PI };
                scene.add(crane);
                factoryObjects.facilities.push(crane);
            }

            const railMat = new THREE.MeshStandardMaterial({ color: 0x555555 });
            const rail1 = new THREE.Mesh(new THREE.BoxGeometry(50, 0.5, 0.5), railMat);
            rail1.position.set(0, 12.25, -9);
            scene.add(rail1);
            factoryObjects.facilities.push(rail1);
        }

        function setupEventListeners() {
            window.addEventListener('resize', onWindowResize);

            const raycaster = new THREE.Raycaster();
            const mouse = new THREE.Vector2();

            renderer.domElement.addEventListener('click', (event) => {
                mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(scene.children, true);

                for (const intersect of intersects) {
                    let obj = intersect.object;
                    while (obj.parent && !obj.userData.name) {
                        obj = obj.parent;
                    }
                    if (obj.userData.name && obj.userData.isClickable) {
                        showInfo(obj.userData.name);
                        highlightObject(obj);
                        break;
                    }
                }
            });

            document.querySelectorAll('.control-btn[data-view]').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.control-btn[data-view]').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    switchView(btn.dataset.view);
                });
            });

            document.getElementById('toggle-animation').addEventListener('click', function() {
                animationEnabled = !animationEnabled;
                this.textContent = animationEnabled ? '暂停动画' : '启用动画';
                this.classList.toggle('active', animationEnabled);
            });

            document.getElementById('reset-view').addEventListener('click', () => {
                switchView('perspective');
                document.querySelectorAll('.control-btn[data-view]').forEach(b => {
                    b.classList.toggle('active', b.dataset.view === 'perspective');
                });
            });

            document.getElementById('close-btn').addEventListener('click', () => {
                document.getElementById('info-panel').style.display = 'none';
            });

            document.querySelectorAll('.layer-item input').forEach(checkbox => {
                checkbox.addEventListener('change', (e) => {
                    toggleLayer(e.target.dataset.layer, e.target.checked);
                });
            });
        }

        function switchView(view) {
            currentView = view;
            let targetPos, targetLook;

            switch (view) {
                case 'perspective':
                    targetPos = new THREE.Vector3(80, 60, 80);
                    targetLook = new THREE.Vector3(0, 0, 0);
                    break;
                case 'birdseye':
                    targetPos = new THREE.Vector3(0, 150, 0.1);
                    targetLook = new THREE.Vector3(0, 0, 0);
                    break;
                case 'front':
                    targetPos = new THREE.Vector3(0, 30, 200);
                    targetLook = new THREE.Vector3(0, 10, 0);
                    break;
            }

            animateCamera(targetPos, targetLook);
        }

        function animateCamera(targetPos, targetLook) {
            const startPos = camera.position.clone();
            const startTarget = controls.target.clone();
            const duration = 1000;
            const startTime = Date.now();

            function update() {
                const elapsed = Date.now() - startTime;
                const t = Math.min(elapsed / duration, 1);
                const eased = 1 - Math.pow(1 - t, 3);

                camera.position.lerpVectors(startPos, targetPos, eased);
                controls.target.lerpVectors(startTarget, targetLook, eased);
                controls.update();

                if (t < 1) requestAnimationFrame(update);
            }
            update();
        }

        function showInfo(name) {
            const data = factoryData[name];
            if (!data) return;

            const panel = document.getElementById('info-panel');
            const title = document.getElementById('info-title');
            const content = document.getElementById('info-content');

            title.textContent = `📋 ${name}`;
            content.innerHTML = `
                <p style="color:#ccc;margin-bottom:15px;">${data.desc}</p>
                <div style="border-top:1px solid rgba(0,200,255,0.2);padding-top:10px;">
                    ${Object.entries(data.stats).map(([k, v]) => `
                        <div class="info-item">
                            <span class="info-label">${k}:</span>
                            <span class="info-value">${v}</span>
                        </div>
                    `).join('')}
                </div>
            `;
            panel.style.display = 'block';
        }

        let highlightedObject = null;
        function highlightObject(obj) {
            if (highlightedObject) {
                resetObjectColor(highlightedObject);
            }
            highlightedObject = obj;

            obj.traverse((child) => {
                if (child.isMesh && child.material) {
                    child.userData.originalEmissive = child.material.emissive ? child.material.emissive.clone() : new THREE.Color(0x000000);
                    child.material.emissive = new THREE.Color(0x00c8ff);
                    child.material.emissiveIntensity = 0.3;
                }
            });
        }

        function resetObjectColor(obj) {
            obj.traverse((child) => {
                if (child.isMesh && child.material && child.userData.originalEmissive) {
                    child.material.emissive = child.userData.originalEmissive;
                    child.material.emissiveIntensity = child.userData.originalEmissiveIntensity || 0;
                }
            });
        }

        function toggleLayer(layerName, visible) {
            const objects = factoryObjects[layerName];
            if (!objects) return;

            objects.forEach(obj => {
                obj.visible = visible;
            });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function updateObjectCount() {
            let count = 0;
            Object.values(factoryObjects).forEach(arr => count += arr.length);
            document.getElementById('obj-count').textContent = `对象: ${count}`;
        }

        function animate() {
            animationId = requestAnimationFrame(animate);

            const delta = clock.getDelta();
            const time = clock.getElapsedTime();

            if (animationEnabled) {
                factoryObjects.facilities.forEach((obj, i) => {
                    if (obj.userData.phase !== undefined) {
                        obj.position.y = obj.userData.originalY + Math.sin(time + obj.userData.phase) * 0.5;
                    }
                });
            }

            controls.update();
            renderer.render(scene, camera);

            const fps = Math.round(1 / Math.max(delta, 0.016));
            document.getElementById('fps').textContent = `FPS: ${fps}`;
        }

        init();
    </script>
</body>
</html>
